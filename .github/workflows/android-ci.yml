name: Android CI - Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
      run: ./gradlew assembleDebug

    - name: Build Release APK
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK (Unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: ./apk

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release-unsigned
        path: ./apk

    - name: Get version info
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}-build${{ github.run_number }}
        name: MovieBlock Android v${{ steps.version.outputs.VERSION }} (Build ${{ github.run_number }})
        body: |
          ## MovieBlock Android App
          
          **Version:** ${{ steps.version.outputs.VERSION }}
          **Build:** ${{ github.run_number }}
          **Commit:** ${{ github.sha }}
          
          ### Downloads
          - **app-debug.apk** - Debug build (recommended for testing)
          - **app-release-unsigned.apk** - Release build (unsigned, for manual signing)
          
          ### Changes in this release
          ${{ github.event.head_commit.message }}
        files: |
          ./apk/app-debug.apk
          ./apk/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
