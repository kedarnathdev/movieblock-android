name: Android CI - Build & Release

on:
  push:
    branches: [ main, prerelease ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
      run: ./gradlew assembleDebug

    - name: Build Release APK
      env:
        API_BASE_URL: ${{ secrets.API_BASE_URL }}
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK (Unsigned)
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: ./apk

    - name: Download Release APK
      uses: actions/download-artifact@v4
      with:
        name: app-release-unsigned
        path: ./apk

    - name: Get version info
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle.kts | sed 's/.*versionName = "\([^"]*\)".*/\1/')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "BUILD_NUMBER=${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Determine release type
      id: release_type
      run: |
        if [ "${{ github.ref }}" == "refs/heads/prerelease" ]; then
          echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          echo "SUFFIX=-prerelease" >> $GITHUB_OUTPUT
        else
          echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          echo "SUFFIX=" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}-build${{ github.run_number }}${{ steps.release_type.outputs.SUFFIX }}
        name: MovieBlock Android v${{ steps.version.outputs.VERSION }} (Build ${{ github.run_number }}) ${{ steps.release_type.outputs.SUFFIX == '-prerelease' && '- Prerelease' || '' }}
        body: |
          ## MovieBlock Android App
          
          **Version:** ${{ steps.version.outputs.VERSION }}
          **Build:** ${{ github.run_number }}
          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}
          
          ${{ steps.release_type.outputs.IS_PRERELEASE == 'true' && '⚠️ **This is a PRERELEASE build for testing.**' || '✅ **This is a PRODUCTION release.**' }}
          
          ### Downloads
          - **app-debug.apk** - Debug build (recommended for testing)
          - **app-release-unsigned.apk** - Release build (unsigned, for manual signing)
          
          ### Changes in this release
          ${{ github.event.head_commit.message }}
        files: |
          ./apk/app-debug.apk
          ./apk/app-release-unsigned.apk
        draft: false
        prerelease: ${{ steps.release_type.outputs.IS_PRERELEASE == 'true' }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
